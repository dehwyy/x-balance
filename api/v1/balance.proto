syntax = "proto3";
package balance.v1;
option go_package = "github.com/dehwyy/balance/internal/generated/pb/v1;balancepb";

service BalanceService {
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
  rpc Credit(CreditRequest) returns (CreditResponse);
  rpc Debit(DebitRequest) returns (DebitResponse);
  rpc Freeze(FreezeRequest) returns (FreezeResponse);
  rpc Unfreeze(UnfreezeRequest) returns (UnfreezeResponse);
}

message GetBalanceRequest { string user_id = 1; }
message GetBalanceResponse {
  string available = 1;
  string frozen = 2;
  string total = 3;
}

message CreditRequest {
  string user_id = 1;
  string amount = 2;
  string transaction_id = 3;
}
message CreditResponse {
  string new_balance = 1;
  string transaction_id = 2;
}

message DebitRequest {
  string user_id = 1;
  string amount = 2;
  string transaction_id = 3;
}
message DebitResponse {
  string new_balance = 1;
  string transaction_id = 2;
}

message FreezeRequest {
  string user_id = 1;
  string amount = 2;
  string transaction_id = 3;
  int64 freeze_timeout_seconds = 4;
}
message FreezeResponse {
  string frozen_amount = 1;
  string transaction_id = 2;
}

message UnfreezeRequest {
  string user_id = 1;
  string transaction_id = 3;
}
message UnfreezeResponse {
  string unfrozen_amount = 1;
  string transaction_id = 2;
}
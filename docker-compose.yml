version: '3.9'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: balance
      POSTGRES_USER: balance
      POSTGRES_PASSWORD: balance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    command: redis-server --notify-keyspace-events KEA
    ports:
      - "6379:6379"

volumes:
  postgres_data:
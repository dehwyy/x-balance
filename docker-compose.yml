services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: balance
      POSTGRES_USER: balance
      POSTGRES_PASSWORD: balance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U balance -d balance"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    command: redis-server --notify-keyspace-events KEA
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "50051:50051"
    environment:
      DATABASE_URL: postgres://balance:balance@postgres:5432/balance?sslmode=disable
      REDIS_URL: redis://redis:6379
      PORT: 50051
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
